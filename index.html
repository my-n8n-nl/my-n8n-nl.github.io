<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Product Consultant</title>
    <style>body { font-family: sans-serif; padding: 20px; }</style>
</head>
<body>
    <h1>Product Consultant</h1>
    <textarea id="idee" style="width: 100%; height: 100px;"></textarea><br>
    <!-- Voeg dit toe in je HTML body -->
<input type="password" id="code" placeholder="Voer je geheime code in">
    <button onclick="stuurIdee()">Valideer mijn idee</button>
    <pre id="resultaat"></pre>



<script>
async function stuurIdee() {
const resultaatDiv = document.getElementById('resultaat');
const idee = document.getElementById('idee').value;
const code = document.getElementById('code').value; // Nieuw veld
resultaatDiv.innerText = "Consultant aan het denken...";

try {
const res = await fetch('https://my-n8n.nl/webhook/product-consultant', {
method: 'POST',
body: JSON.stringify({idee: idee, code: code}), // Code meesturen
headers: {'Content-Type': 'application/json'}
});
const data = await res.json();
resultaatDiv.innerText = JSON.stringify(data, null, 2);
} catch (error) {
resultaatDiv.innerText = "Fout bij de validatie.";
}
}
</script>

</body>
</html>
