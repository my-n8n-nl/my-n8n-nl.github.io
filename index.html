<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Product Consultant | AI Strategy</title>
    <style>
        body { font-family: 'Segoe UI', system-ui; padding: 40px; background: #f4f7f6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, textarea, input { width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .result-card { margin-top: 20px; padding: 20px; background: #fff; border-left: 5px solid #007bff; border-radius: 4px; border: 1px solid #ddd; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Product Consultant</h1>
        <select id="toolType">
            <option value="business-case">Business Case Generator</option>
            <option value="persona">Persona Generator</option>
        </select>
        <textarea id="idee" placeholder="Beschrijf je productidee..."></textarea>
        <input type="password" id="code" placeholder="Toegangscode">
        <button onclick="stuurIdee()">Generate strategy</button>
        <div id="resultaat"></div>
    </div>

    <script>
    async function stuurIdee() {
        const div = document.getElementById('resultaat');
        const tool = document.getElementById('toolType').value;
        const idee = document.getElementById('idee').value;
        const code = document.getElementById('code').value;
        div.innerText = "Consultant aan het werk...";
        
        try {
            const res = await fetch('https://my-n8n.nl/webhook/product-consultant', {
                method: 'POST',
                body: JSON.stringify({idee: idee, code: code, type: tool}),
                headers: {'Content-Type': 'application/json'}
            });
            const data = await res.json();
            if (data.error) { div.innerHTML = `<p style="color:red">${data.error}</p>`; return; }
            
            // Verwerk JSON antwoord
            const content = typeof data.output === 'string' ? JSON.parse(data.output) : data;
            
            div.innerHTML = `<div class="result-card"><h3>Resultaat</h3><pre>${JSON.stringify(content, null, 2)}</pre></div>`;
        } catch (e) { div.innerText = "Fout bij de validatie."; }
    }
    </script>
</body>
</html>
