<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>product consultant| Turn Ideas into Action</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 40px; background: #fdfdfd; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 40px; border-radius: 16px; border: 1px solid #eee; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: #007bff; margin-bottom: 5px; }
        h2 { font-size: 1.2em; color: #666; margin-bottom: 30px; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; padding: 15px; font-size: 16px; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .result-card { margin-top: 30px; padding: 25px; background: #f8f9fa; border-left: 5px solid #007bff; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>product consultant</h1>
        <h2>Turn Ideas into Action. The AI-powered companion for product teams and startups.</h2>
        
        <textarea id="idee" placeholder="Beschrijf je productidee..."></textarea>
        <input type="password" id="code" placeholder="Voer je toegangscode in">
        <button onclick="stuurIdee()">Generate strategy</button>
        
        <div id="resultaat"></div>
    </div>

    <script>
    async function stuurIdee() {
        const div = document.getElementById('resultaat');
        const idee = document.getElementById('idee').value;
        const code = document.getElementById('code').value;
        div.innerHTML = "Validating strategy...";
        
        try {
            const res = await fetch('https://my-n8n.nl/webhook/product-consultant', {
                method: 'POST',
                body: JSON.stringify({idee: idee, code: code}),
                headers: {'Content-Type': 'application/json'}
            });
            const data = await res.json();
            const content = typeof data.output === 'string' ? JSON.parse(data.output) : data;

            div.innerHTML = `
                <div class="result-card">
                    <h3>${content.concept_naam}</h3>
                    <p><strong>Probleem & Oplossing:</strong><br>${content.probleem_oplossing}</p>
                    <p><strong>Doelgroep:</strong><br>${content.doelgroep_beschrijving}</p>
                    <p><strong>Belangrijkste Risico:</strong><br>${content.belangrijkste_risico}</p>
                </div>
            `;
        } catch (error) {
            div.innerHTML = "Auth error or server timeout. Try again!";
        }
    }
    </script>
</body>
</html>
