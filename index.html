<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Product Consultant | AI Strategy</title>
    <style>
        body { font-family: 'Segoe UI', system-ui; padding: 40px; background: #f4f7f6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, textarea, input { width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .result-card { margin-top: 20px; padding: 20px; background: #fff; border-left: 5px solid #28a745; border-radius: 4px; border: 1px solid #ddd; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI IdeaFlow v1.0.4</h1>
        <select id="toolType">
            <option value="business-case">Business Case Generator</option>
            <option value="persona">Persona Generator</option>
        </select>
        <textarea id="idee" placeholder="Beschrijf je productidee..."></textarea>
        <input type="password" id="code" placeholder="Voer je toegangscode in voor volledige toegang">
        <button onclick="stuurIdee()">Generate strategy</button>
        <div id="resultaat"></div>
    </div>
    <script>
    async function stuurIdee() {
        const div = document.getElementById('resultaat');
        div.innerText = "Consultant aan het werk...";
        const bodyData = {
            idee: document.getElementById('idee').value,
            code: document.getElementById('code').value,
            type: document.getElementById('toolType').value
        };
        try {
            const res = await fetch('https://my-n8n.nl/webhook/product-consultant', {
                method: 'POST',
                body: JSON.stringify(bodyData),
                headers: {'Content-Type': 'application/json'}
            });
            const data = await res.json();
            div.innerHTML = `<div class="result-card"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
        } catch (e) {
            div.innerText = "Fout bij de validatie.";
        }
    }
    </script>
</body>
</html>
