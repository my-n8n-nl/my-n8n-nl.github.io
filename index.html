<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Product Consultant</title>
<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 40px; background: #f4f7f6; }
.container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
textarea { width: 100%; height: 100px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; }
.result-card { margin-top: 20px; padding: 15px; background: #eef6ff; border-left: 5px solid #007bff; border-radius: 4px; }
h3 { margin-top: 0; color: #007bff; }
</style>
</head>
<body>
<div class="container">
<h1>Product Consultant</h1>
<textarea id="idee" placeholder="Beschrijf je idee..."></textarea>
<input type="password" id="code" placeholder="Geheime code">
<button onclick="stuurIdee()">Valideer mijn idee</button>
<div id="resultaat"></div>
</div>

<script>
async function stuurIdee() {
const div = document.getElementById('resultaat');
const idee = document.getElementById('idee').value;
const code = document.getElementById('code').value;
div.innerHTML = "Consultant aan het denken...";

try {
const res = await fetch('https://my-n8n.nl/webhook/product-consultant', {
method: 'POST',
body: JSON.stringify({idee: idee, code: code}),
headers: {'Content-Type': 'application/json'}
});
const data = await res.json();

// Omdat n8n vaak dubbel JSON geeft:
const content = typeof data.output === 'string' ? JSON.parse(data.output) : data;

div.innerHTML = `
<div class="result-card">
<h3>${content.concept_naam}</h3>
<p><strong>Probleem & Oplossing:</strong><br>${content.probleem_oplossing}</p>
<p><strong>Doelgroep:</strong><br>${content.doelgroep_beschrijving}</p>
<p><strong>Grootste Risico:</strong><br>${content.belangrijkste_risico}</p>
</div>
`;
} catch (error) {
div.innerHTML = "Fout bij laden of niet geautoriseerd.";
}
}
</script>
</body>
</html>
